<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Anfitrio — Acceso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
  :root {
    --bg:#f7faf7; --surface:#fff; --ink:#1c2b1c; --ink-muted:#8fa08f;
    --green:#2a7a3b; --green-mid:#3da354; --green-lt:#eaf6ec; --green-xs:#f2faf3;
    --red:#b52a2a; --red-lt:#fdf0f0; --amber:#b06010; --amber-lt:#fdf5ea;
    --border:#e2ebe2; --border-mid:#ccdacc;
    --font:'Plus Jakarta Sans',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--font);
    min-height:100dvh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:20px;
  }

  /* ─── CARD ─── */
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:36px 28px 32px;width:100%;max-width:420px;
    box-shadow:0 4px 24px rgba(42,122,59,0.10);
  }

  /* ─── BRAND ─── */
  .brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:26px}
  .logo{width:48px;height:48px;filter:drop-shadow(0 2px 6px rgba(42,122,59,0.2))}
  .brand-text .name{font-size:1.5rem;font-weight:700;letter-spacing:-0.03em;color:var(--ink)}
  .brand-text .name em{color:var(--green-mid);font-style:normal}
  .brand-text .tag{font-size:0.65rem;font-weight:600;color:var(--ink-muted);letter-spacing:0.09em;text-transform:uppercase}

  /* ─── TABS ─── */
  .tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;gap:4px;margin-bottom:24px;border:1px solid var(--border)}
  .tab{
    flex:1;padding:9px;border:none;border-radius:9px;background:transparent;
    font-family:var(--font);font-size:0.85rem;font-weight:600;color:var(--ink-muted);
    cursor:pointer;transition:all .2s;
  }
  .tab.active{background:var(--surface);color:var(--green);box-shadow:0 1px 6px rgba(42,122,59,0.12)}

  /* ─── PANELS ─── */
  .panel{display:none}.panel.active{display:block}

  /* ─── FIELDS ─── */
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
  label{font-size:0.68rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-muted)}
  input[type=email],input[type=password],input[type=text],select{
    font-family:var(--font);font-size:0.95rem;font-weight:500;
    background:var(--bg);border:1.5px solid var(--border-mid);border-radius:12px;
    padding:11px 14px;width:100%;color:var(--ink);transition:border-color .2s,box-shadow .2s;
    -webkit-appearance:none;appearance:none;
  }
  input:focus,select:focus{outline:none;border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(61,163,84,0.14)}

  /* ─── SEPARADOR ─── */
  .sep{display:flex;align-items:center;gap:10px;margin:14px 0 13px}
  .sep-line{flex:1;height:1px;background:var(--border)}
  .sep-txt{font-size:0.72rem;font-weight:600;color:var(--ink-muted)}


  /* ─── BTNS ─── */
  .btn-main{
    width:100%;padding:14px;border:none;border-radius:12px;
    background:var(--green);color:#fff;font-family:var(--font);
    font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:6px;
    transition:filter .15s,transform .15s;
  }
  .btn-main:active{transform:scale(0.97);filter:brightness(0.92)}
  .btn-main:disabled{opacity:0.6;cursor:not-allowed}

  /* ─── MENSAJES ─── */
  .msg{border-radius:10px;padding:10px 14px;font-size:0.82rem;margin-top:10px;display:none}
  .msg.show{display:block}
  .msg.error{background:var(--red-lt);border:1px solid rgba(181,42,42,0.2);color:var(--red)}
  .msg.ok{background:var(--green-lt);border:1px solid var(--border-mid);color:var(--green)}
  .msg.warn{background:var(--amber-lt);border:1px solid rgba(176,96,16,0.2);color:var(--amber)}

  /* ─── LINKS ─── */
  .links{text-align:center;margin-top:16px;font-size:0.8rem;color:var(--ink-muted)}
  .links a{color:var(--green);text-decoration:none;font-weight:600}
  .links a:hover{text-decoration:underline}

  /* ─── PASOS REGISTRO ─── */
  .steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px}
  .step{width:28px;height:28px;border-radius:50%;border:2px solid var(--border-mid);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:var(--ink-muted);transition:all .3s}
  .step.active{border-color:var(--green);background:var(--green);color:#fff}
  .step.done{border-color:var(--green-mid);background:var(--green-lt);color:var(--green)}
  .step-line{flex:1;height:2px;background:var(--border);border-radius:1px;max-width:40px;transition:background .3s}
  .step-line.done{background:var(--green-mid)}

  /* ─── SPINNER ─── */
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .version{font-size:0.65rem;color:var(--ink-muted);text-align:center;margin-top:24px;opacity:0.6}

  @media(max-width:480px){.card{padding:28px 18px 24px}}
  @media(prefers-color-scheme:dark){
    :root{--bg:#111a11;--surface:#1a2a1a;--ink:#e8f4e8;--ink-muted:#6a8a6a;--green:#5dc478;--green-mid:#4db868;--green-lt:#1e3a24;--green-xs:#162216;--red:#e06060;--red-lt:#2a1212;--amber:#e0a040;--amber-lt:#2a1e08;--border:#2a3e2a;--border-mid:#3a5a3a}
  }
</style>
</head>
<body>

<div class="card">

  <!-- LOGO -->
  <div class="brand">
    <svg class="logo" viewBox="0 0 46 46" fill="none">
      <defs><linearGradient id="g1" x1="0" y1="0" x2="46" y2="46" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#4fc066"/><stop offset="100%" stop-color="#2a7a3b"/></linearGradient></defs>
      <rect width="46" height="46" rx="13" fill="url(#g1)"/>
      <circle cx="15" cy="15" r="6" stroke="white" stroke-width="2.2" fill="none"/>
      <circle cx="15" cy="15" r="2.2" fill="white" opacity="0.4"/>
      <line x1="19.2" y1="19.2" x2="29" y2="29" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="25.5" y1="29" x2="25.5" y2="32.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="29" y1="29" x2="32.5" y2="29" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="31" cy="31" r="9.5" fill="white" opacity="0.18"/>
      <circle cx="31" cy="31" r="9.5" stroke="white" stroke-width="1.6" fill="none" opacity="0.55"/>
      <polyline points="26.2,31 29.4,34.4 35.8,27.6" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <div class="brand-text">
      <div class="name">Anfit<em>rio</em></div>
      <div class="tag">Gestión de cambio</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" id="tab-login"    onclick="switchTab('login')">Iniciar sesión</button>
    <button class="tab"        id="tab-registro"  onclick="switchTab('registro')">Crear cuenta</button>
  </div>

  <!-- ═══ PANEL LOGIN ═══ -->
  <div class="panel active" id="panel-login">
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="tu@empresa.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-main" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="msg error" id="login-msg"></div>
    <div class="links">
      <a href="#" onclick="doReset()">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <!-- ═══ PANEL REGISTRO ═══ -->
  <div class="panel" id="panel-registro">

    <!-- Indicador de pasos -->
    <div class="steps">
      <div class="step active" id="s1">1</div>
      <div class="step-line"   id="sl1"></div>
      <div class="step"        id="s2">2</div>
      <div class="step-line"   id="sl2"></div>
      <div class="step"        id="s3">✓</div>
    </div>

    <!-- PASO 1: Datos de la empresa -->
    <div id="reg-paso1">
      <div class="field">
        <label>Nombre de la empresa</label>
        <input type="text" id="reg-empresa" placeholder="Ej: Gestión Pisos Costa SL" maxlength="60">
      </div>

      <button class="btn-main" onclick="regPaso1()">Siguiente →</button>
      <div class="msg error" id="reg-msg1"></div>
    </div>

    <!-- PASO 2: Datos del administrador -->
    <div id="reg-paso2" style="display:none">
      <div class="field">
        <label>Tu nombre completo</label>
        <input type="text" id="reg-nombre" placeholder="Nombre y apellido" maxlength="60">
      </div>
      <div class="field">
        <label>Correo electrónico (admin)</label>
        <input type="email" id="reg-email" placeholder="admin@tuempresa.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Repetir contraseña</label>
        <input type="password" id="reg-pass2" placeholder="Repite la contraseña" autocomplete="new-password">
      </div>
      <button class="btn-main" id="btn-registro" onclick="doRegistro()">Crear mi cuenta</button>
      <div class="msg error" id="reg-msg2"></div>
      <div class="links" style="margin-top:12px">
        <a href="#" onclick="irPaso(1)">← Volver</a>
      </div>
    </div>

    <!-- PASO 3: Confirmación -->
    <div id="reg-paso3" style="display:none;text-align:center;padding:10px 0">
      <div style="font-size:3rem;margin-bottom:14px">🎉</div>
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:8px">¡Cuenta creada!</div>
      <div style="font-size:0.88rem;color:var(--ink-muted);line-height:1.6;margin-bottom:20px">
        Tu empresa está lista. Entrando a tu panel de administración…
      </div>
      <div class="spinner" style="border-top-color:var(--green);border-color:var(--border-mid)"></div>
    </div>

  </div>
  <!-- fin panel registro -->

</div>

<div class="version">Anfitrio v2.0 · Multi-empresa</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         sendPasswordResetEmail, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, addDoc, updateDoc,
         collection, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyCkEGPF3G8ojNMHmgtmUlNgNQpqMOxMlgo",
  authDomain:        "anfitrio-app.firebaseapp.com",
  projectId:         "anfitrio-app",
  storageBucket:     "anfitrio-app.firebasestorage.app",
  messagingSenderId: "963136293931",
  appId:             "1:963136293931:web:35d647947518a24f3d2e6e"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// Estado del registro
let regData = { empresa:'' };

// ── AUTO-REDIRECT SI YA HAY SESIÓN ────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) return;
  try {
    const snap = await getDoc(doc(db,'usuarios',user.uid));
    if (!snap.exists()) return;
    const d = snap.data();
    sessionStorage.setItem('anfitrio_user', JSON.stringify({
      uid: user.uid, email: user.email,
      nombre: d.nombre, rol: d.rol,
      empresaId: d.empresaId, empresaNombre: d.empresaNombre || ''
    }));
    window.location.href = d.rol === 'admin' ? 'admin.html' : 'index.html';
  } catch(e) { /* perfil aún no creado, ignorar */ }
});

// ── TABS ──────────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  document.getElementById('panel-login').classList.toggle('active', tab==='login');
  document.getElementById('panel-registro').classList.toggle('active', tab==='registro');
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-registro').classList.toggle('active', tab==='registro');
  clearMsgs();
};

// ── PASOS DEL REGISTRO ────────────────────────────────────────────────
window.irPaso = function(n) {
  [1,2,3].forEach(i => {
    document.getElementById('reg-paso'+i).style.display = i===n ? 'block' : 'none';
    const s = document.getElementById('s'+i);
    if (s) s.className = 'step' + (i<n?' done':i===n?' active':'');
  });
  if (document.getElementById('sl1'))
    document.getElementById('sl1').className = 'step-line' + (n>1?' done':'');
  if (document.getElementById('sl2'))
    document.getElementById('sl2').className = 'step-line' + (n>2?' done':'');
};

window.regPaso1 = function() {
  const empresa = document.getElementById('reg-empresa').value.trim();
  if (!empresa) { showMsg('reg-msg1','error','Escribe el nombre de tu empresa.'); return; }
  regData.empresa = empresa;
  clearMsgs();
  irPaso(2);
};

// ── CREAR CUENTA ──────────────────────────────────────────────────────
window.doRegistro = async function() {
  const nombre = document.getElementById('reg-nombre').value.trim();
  const email  = document.getElementById('reg-email').value.trim();
  const pass   = document.getElementById('reg-pass').value;
  const pass2  = document.getElementById('reg-pass2').value;
  const btn    = document.getElementById('btn-registro');

  if (!nombre) { showMsg('reg-msg2','error','Escribe tu nombre completo.'); return; }
  if (!email)  { showMsg('reg-msg2','error','Escribe tu correo electrónico.'); return; }
  if (pass.length < 6) { showMsg('reg-msg2','error','La contraseña debe tener al menos 6 caracteres.'); return; }
  if (pass !== pass2)  { showMsg('reg-msg2','error','Las contraseñas no coinciden.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creando cuenta…';

  try {
    // 1. Crear usuario en Firebase Auth
    const { user } = await createUserWithEmailAndPassword(auth, email, pass);

    // 2. Crear empresa en Firestore
    // Generamos un ID limpio basado en el nombre
    const empresaId = regData.empresa
      .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')
      .slice(0,30) + '-' + Date.now().toString(36);

    await setDoc(doc(db,'empresas', empresaId), {
      nombre:   regData.empresa,
      adminUID: user.uid,
      creado:   serverTimestamp(),
      activo:   true
    });

    // 3. Crear perfil del admin en Firestore
    await setDoc(doc(db,'usuarios', user.uid), {
      nombre,
      email,
      rol:           'admin',
      empresaId,
      empresaNombre: regData.empresa,
      creado:        serverTimestamp()
    });

    // 4. Mostrar confirmación y redirigir
    irPaso(3);
    // onAuthStateChanged se encarga del redirect automático
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Crear mi cuenta';
    const msgs = {
      'auth/email-already-in-use': 'Ya existe una cuenta con ese correo. ¿Quieres iniciar sesión?',
      'auth/invalid-email':        'El formato del correo no es válido.',
      'auth/weak-password':        'Contraseña demasiado débil. Usa al menos 6 caracteres.',
    };
    showMsg('reg-msg2','error', msgs[e.code] || 'Error: ' + e.message);
  }
};

// ── LOGIN ─────────────────────────────────────────────────────────────
window.doLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('btn-login');

  if (!email || !pass) { showMsg('login-msg','error','Completa todos los campos.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entrando…';
  clearMsgs();

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // onAuthStateChanged gestiona el redirect
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
    const msgs = {
      'auth/user-not-found':     'No existe una cuenta con ese correo.',
      'auth/wrong-password':     'Contraseña incorrecta.',
      'auth/invalid-email':      'Formato de correo no válido.',
      'auth/too-many-requests':  'Demasiados intentos. Espera unos minutos.',
      'auth/invalid-credential': 'Correo o contraseña incorrectos.',
    };
    showMsg('login-msg','error', msgs[e.code] || 'Error: ' + e.message);
  }
};

// ── RECUPERAR CONTRASEÑA ──────────────────────────────────────────────
window.doReset = async function() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showMsg('login-msg','error','Escribe tu correo arriba y pulsa este enlace.'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg('login-msg','ok','✅ Correo de recuperación enviado a ' + email);
  } catch(e) {
    showMsg('login-msg','error','No se pudo enviar el correo. Comprueba la dirección.');
  }
};

// ── HELPERS ───────────────────────────────────────────────────────────
function showMsg(id, type, txt) {
  const el = document.getElementById(id);
  el.textContent = txt;
  el.className   = 'msg ' + type + ' show';
}
function clearMsgs() {
  document.querySelectorAll('.msg').forEach(m => m.classList.remove('show'));
}

// Enter en login
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const panelLogin = document.getElementById('panel-login').classList.contains('active');
  if (panelLogin) window.doLogin();
});
</script>
</body>
</html>
