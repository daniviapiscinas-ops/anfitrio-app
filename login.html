<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Anfitrio — Acceso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
  :root {
    --bg:#f7faf7; --surface:#fff; --ink:#1c2b1c; --ink-muted:#8fa08f;
    --green:#2a7a3b; --green-mid:#3da354; --green-lt:#eaf6ec; --green-xs:#f2faf3;
    --red:#b52a2a; --red-lt:#fdf0f0; --border:#e2ebe2; --border-mid:#ccdacc;
    --font:'Plus Jakarta Sans',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px 32px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(42,122,59,0.10)}

  .brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px}
  .logo{width:48px;height:48px;filter:drop-shadow(0 2px 6px rgba(42,122,59,0.2))}
  .brand-text .name{font-size:1.5rem;font-weight:700;letter-spacing:-0.03em;color:var(--ink)}
  .brand-text .name em{color:var(--green-mid);font-style:normal}
  .brand-text .tag{font-size:0.65rem;font-weight:600;color:var(--ink-muted);letter-spacing:0.09em;text-transform:uppercase}

  h2{font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:20px;text-align:center}

  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  label{font-size:0.68rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-muted)}
  input[type=email],input[type=password],input[type=text]{
    font-family:var(--font);font-size:0.95rem;font-weight:500;
    background:var(--bg);border:1.5px solid var(--border-mid);border-radius:12px;
    padding:11px 14px;width:100%;color:var(--ink);transition:border-color .2s,box-shadow .2s
  }
  input:focus{outline:none;border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(61,163,84,0.14)}

  .btn-login{
    width:100%;padding:14px;border:none;border-radius:12px;
    background:var(--green);color:#fff;font-family:var(--font);
    font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:6px;
    transition:filter .15s,transform .15s
  }
  .btn-login:active{transform:scale(0.97);filter:brightness(0.92)}
  .btn-login:disabled{opacity:0.6;cursor:not-allowed}

  .error-msg{
    background:var(--red-lt);border:1px solid rgba(181,42,42,0.2);border-radius:10px;
    padding:10px 14px;font-size:0.82rem;color:var(--red);margin-top:10px;display:none
  }
  .error-msg.show{display:block}

  .forgot{text-align:center;margin-top:16px;font-size:0.8rem;color:var(--ink-muted)}
  .forgot a{color:var(--green);text-decoration:none;font-weight:600}
  .forgot a:hover{text-decoration:underline}

  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .version{font-size:0.65rem;color:var(--ink-muted);text-align:center;margin-top:24px;opacity:0.6}

  @media(prefers-color-scheme:dark){
    :root{--bg:#111a11;--surface:#1a2a1a;--ink:#e8f4e8;--ink-muted:#6a8a6a;--green:#5dc478;--green-mid:#4db868;--green-lt:#1e3a24;--green-xs:#162216;--red:#e06060;--red-lt:#2a1212;--border:#2a3e2a;--border-mid:#3a5a3a}
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <svg class="logo" viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="46" y2="46" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#4fc066"/><stop offset="100%" stop-color="#2a7a3b"/>
        </linearGradient>
      </defs>
      <rect width="46" height="46" rx="13" fill="url(#g1)"/>
      <circle cx="15" cy="15" r="6" stroke="white" stroke-width="2.2" fill="none"/>
      <circle cx="15" cy="15" r="2.2" fill="white" opacity="0.4"/>
      <line x1="19.2" y1="19.2" x2="29" y2="29" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="25.5" y1="29" x2="25.5" y2="32.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="29" y1="29" x2="32.5" y2="29" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="31" cy="31" r="9.5" fill="white" opacity="0.18"/>
      <circle cx="31" cy="31" r="9.5" stroke="white" stroke-width="1.6" fill="none" opacity="0.55"/>
      <polyline points="26.2,31 29.4,34.4 35.8,27.6" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <div class="brand-text">
      <div class="name">Anfit<em>rio</em></div>
      <div class="tag">Gestión de cambio</div>
    </div>
  </div>

  <h2>Accede a tu cuenta</h2>

  <div class="field">
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="tu@empresa.com" autocomplete="email">
  </div>
  <div class="field">
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
  <div class="error-msg" id="error-msg"></div>

  <div class="forgot">
    <a href="#" onclick="doReset()">¿Olvidaste tu contraseña?</a>
  </div>
</div>

<div class="version">Anfitrio v2.0 · Multi-empresa</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
import { getFirestore, doc, getDoc }
  from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

// ── CONFIGURA AQUÍ TU PROYECTO FIREBASE ──────────────────────────────
// Ve a: console.firebase.google.com → Tu proyecto → Configuración → Config web
const firebaseConfig = {
  apiKey:            "AIzaSyCkEGPF3G8ojNMHmgtmUlNgNQpqMOxMlgo",
  authDomain:        "anfitrio-app.firebaseapp.com",
  projectId:         "anfitrio-app",
  storageBucket:     "anfitrio-app.firebasestorage.app",
  messagingSenderId: "963136293931",
  appId:             "1:963136293931:web:35d647947518a24f3d2e6e"
};
// ─────────────────────────────────────────────────────────────────────

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// Si ya hay sesión, redirigir
onAuthStateChanged(auth, async user => {
  if (!user) return;
  const snap = await getDoc(doc(db, 'usuarios', user.uid));
  if (!snap.exists()) return;
  const data = snap.data();
  // Guardar en sessionStorage para que la app lo use
  sessionStorage.setItem('anfitrio_user', JSON.stringify({
    uid:       user.uid,
    email:     user.email,
    nombre:    data.nombre,
    rol:       data.rol,         // 'admin' | 'empleado'
    empresaId: data.empresaId,
    empresaNombre: data.empresaNombre || ''
  }));
  if (data.rol === 'admin') {
    window.location.href = 'admin.html';
  } else {
    window.location.href = 'index.html';
  }
});

window.doLogin = async function() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  const errEl    = document.getElementById('error-msg');

  if (!email || !password) { showError('Completa todos los campos.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entrando…';
  errEl.classList.remove('show');

  try {
    await signInWithEmailAndPassword(auth, email, password);
    // onAuthStateChanged se encarga del redirect
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
    const msgs = {
      'auth/user-not-found':      'No existe una cuenta con ese correo.',
      'auth/wrong-password':      'Contraseña incorrecta.',
      'auth/invalid-email':       'El formato del correo no es válido.',
      'auth/too-many-requests':   'Demasiados intentos. Espera unos minutos.',
      'auth/invalid-credential':  'Credenciales incorrectas.',
    };
    showError(msgs[e.code] || 'Error: ' + e.message);
  }
};

window.doReset = async function() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('Escribe tu correo y pulsa "¿Olvidaste tu contraseña?".'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showError('✅ Correo de recuperación enviado a ' + email);
    document.getElementById('error-msg').style.background = 'var(--green-lt)';
    document.getElementById('error-msg').style.color      = 'var(--green)';
    document.getElementById('error-msg').style.borderColor= 'var(--border-mid)';
  } catch(e) {
    showError('No se pudo enviar el correo. Comprueba la dirección.');
  }
};

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

// Enter para hacer login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin();
});
</script>
</body>
</html>
